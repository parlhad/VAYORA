<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VAYORA — Environmental Intelligence</title>
<link rel="stylesheet" href="/static/style.css"/>
</head>
<body>

<!-- ── HEADER ──────────────────────────────────────────────────────────────── -->
<header class="navbar">
  <div class="brand">
    <span class="brand-logo">◈</span>
    <div>
      <span class="brand-name">VAYORA</span>
      <span class="brand-sub">Environmental Intelligence</span>
    </div>
  </div>
  <div class="nav-controls">
    <select id="langSelect" class="ctrl-select" title="Language">
      <option value="en">EN</option>
      <option value="hi">हिंदी</option>
      <option value="hinglish">Hinglish</option>
    </select>
    <select id="modeSelect" class="ctrl-select" title="Response Mode">
      <option value="balanced">Balanced</option>
      <option value="deep">Deep</option>
      <option value="emergency">Emergency</option>
    </select>
    <button class="nav-btn" id="drawerBtn" title="Menu">☰</button>
  </div>
</header>

<!-- ── SIDE DRAWER ──────────────────────────────────────────────────────────── -->
<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<aside class="drawer" id="drawer">
  <div class="drawer-header">
    <span style="font-weight:700;font-size:15px;">VAYORA</span>
    <button class="icon-btn" onclick="closeDrawer()">✕</button>
  </div>

  <div class="drawer-section">
    <div class="section-title">Quick Queries</div>
    <div class="chips">
      <div class="chip" onclick="sendChip('AQI in Delhi now')">Delhi AQI</div>
      <div class="chip" onclick="sendChip('AQI in Mumbai')">Mumbai AQI</div>
      <div class="chip" onclick="sendChip('AQI in Pune today')">Pune AQI</div>
      <div class="chip" onclick="sendChip('AQI in Bangalore')">Bengaluru AQI</div>
      <div class="chip" onclick="sendChip('AQI in Hyderabad')">Hyderabad AQI</div>
      <div class="chip" onclick="sendChip('AQI in Chennai')">Chennai AQI</div>
    </div>
  </div>

  <div class="drawer-section">
    <div class="section-title">Health & Environment</div>
    <button class="drawer-btn" onclick="sendChip('Home remedies for pollution relief')">Home remedies for pollution</button>
    <button class="drawer-btn" onclick="sendChip('What is PM2.5 and why is it dangerous?')">What is PM2.5?</button>
    <button class="drawer-btn" onclick="sendChip('Breathing exercises for lung health')">Breathing exercises</button>
    <button class="drawer-btn" onclick="sendChip('How to protect myself from air pollution?')">Pollution protection tips</button>
    <button class="drawer-btn" onclick="sendChip('What causes smog and how to reduce it?')">What causes smog?</button>
    <button class="drawer-btn" onclick="sendChip('Indoor air quality tips')">Indoor air quality</button>
    <button class="drawer-btn" onclick="sendChip('Health effects of long-term pollution exposure')">Long-term health effects</button>
    <button class="drawer-btn" onclick="sendChip('What is climate change and how does it affect air quality?')">Climate & air quality</button>
  </div>

  <div class="drawer-section">
    <div class="section-title">Session</div>
    <button class="drawer-btn" onclick="clearChat()">🗑 Clear Chat</button>
  </div>
  <div class="drawer-footer">VAYORA v3.0 · Environmental AI</div>
</aside>

<!-- ── MAIN ─────────────────────────────────────────────────────────────────── -->
<main class="main" id="main">
  <div class="chat" id="chat">
    <!-- Welcome message injected by JS -->
  </div>

  <!-- AQI badge strip (shows after any city query) -->
  <div class="aqi-strip" id="aqiStrip" style="display:none">
    <span id="aqiCity">—</span>
    <span class="aqi-pill" id="aqiPill">AQI —</span>
    <span id="aqiCat" style="font-size:12px;opacity:0.8">—</span>
  </div>

  <!-- Composer -->
  <div class="composer">
    <button class="icon-btn mic-btn" id="micBtn" title="Voice input" onclick="toggleVoice()">🎤</button>
    <textarea
      id="msgInput"
      class="input"
      placeholder="Ask about AQI, health, environment, remedies..."
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button class="send" id="sendBtn" onclick="sendMessage()">Send</button>
  </div>
  <div class="hint">VAYORA · Live AQI · Health · Environment · Voice enabled</div>
</main>

<script src="/static/app.js"></script>
</body>
</html>
